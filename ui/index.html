<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Chatbot</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/ui/style.css" />
  </head>
  <body>
    <aside>
      <div class="logo">☘ <span>RAG</span>Chatbot</div>

      <div class="upload-zone" id="dropZone">
        <input type="file" id="fileInput" multiple accept=".pdf" />
        <div class="upload-icon">📂</div>
        <div class="upload-label">
          Kéo thả hoặc <strong>chọn file PDF</strong><br />hỗ trợ nhiều file
          cùng lúc
        </div>
      </div>

      <button class="btn-index" id="btnIndex" disabled>⚡ Load File</button>

      <div class="collapse-section" id="collapseSection" style="display: none">
        <div class="collapse-header" id="collapseHeader">
          <div class="collapse-header-left">
            📄 Files đã chọn
            <span class="badge" id="fileBadge">0</span>
          </div>
          <span class="collapse-arrow" id="collapseArrow">▼</span>
        </div>
        <div class="collapse-body" id="collapseBody"></div>
      </div>

      <div class="collapse-section" id="serverFilesSection">
        <div class="collapse-header" id="serverFilesHeader">
          <div class="collapse-header-left">🗄️ File đã lưu</div>
          <span class="collapse-arrow" id="serverFilesArrow">▼</span>
        </div>
        <div class="collapse-body" id="serverFilesBody">
          <div
            style="
              padding: 10px;
              font-size: 11px;
              color: var(--muted);
              text-align: center;
            "
          >
            Đang tải...
          </div>
        </div>
      </div>

      <!-- Model Selector -->
      <div class="model-selector">
        <div class="model-selector-header" id="modelSelectorHeader">
          <div class="ms-left">
            🤖 <span id="modelHeaderLabel">Model: đang tải...</span>
          </div>
          <span class="collapse-arrow open" id="modelArrow">▼</span>
        </div>
        <div class="model-selector-body" id="modelSelectorBody">
          <div class="model-tabs">
            <button
              class="model-tab active"
              id="tabLMS"
              onclick="switchTab('lmstudio')"
            >
              🖥 LMStudio
            </button>
            <!-- <button
              class="model-tab"
              id="tabGemini"
              onclick="switchTab('gemini')"
            >
              ✨ Gemini
            </button> -->
            <button class="model-tab" id="tabQwen" onclick="switchTab('qwen')">
              🐉 Qwen
            </button>
          </div>
          <div id="panelLMS" class="model-group">
            <label>Tên model (LM Studio)</label>
            <input
              class="model-input"
              id="lmsModelInput"
              type="text"
              placeholder="google/gemma-4-e2b"
              value="google/gemma-4-e2b"
            />
          </div>
          <!-- <div id="panelGemini" class="model-group" style="display: none">
            <label>Chọn model Gemini</label>
            <select class="model-select" id="geminiModelSelect">
              <option value="gemini-3-flash-preview">
                gemini-3-flash-preview
              </option>
              <option value="gemini-3.1-pro-preview">
                gemini-3.1-pro-preview
              </option>
              <option value="gemini-3.1-flash-lite-preview">
                gemini-3.1-flash-lite-preview
              </option>
            </select>
          </div> -->
          <div id="panelQwen" class="model-group" style="display: none">
            <label>Chọn model Qwen</label>
            <select class="model-select" id="qwenModelSelect">
              <option value="qwen-plus" selected>qwen-plus</option>
              <option value="qwen-max">qwen-max</option>
              <option value="qwen-turbo">qwen-turbo</option>
              <option value="qwen3-vl-235b-a22b-thinking">
                qwen3-vl-235b-a22b-thinking
              </option>
            </select>
          </div>
          <button class="btn-apply" id="btnApplyModel" onclick="applyModel()">
            Áp dụng
          </button>
          <div class="model-status" id="modelStatus"></div>
        </div>
      </div>

      <a
        class="qdrant-link"
        href="http://localhost:6333/dashboard#/collections"
        target="_blank"
        rel="noopener"
      >
        <span class="ql-icon">🗄️</span>
        <span class="ql-text">Qdrant Dashboard</span>
        <span class="ql-arrow">↗</span>
      </a>
    </aside>

    <main>
      <div class="chat-header">
        <h2>💬 Chat với Local LLM</h2>
      </div>

      <div class="messages" id="messages"></div>

      <div class="chat-input-area">
        <div class="input-wrap">
          <textarea
            id="questionInput"
            placeholder="Hỏi gì đó về tài liệu..."
            rows="1"
          ></textarea>
        </div>
        <button class="btn-send" id="btnSend">➤</button>
      </div>
    </main>

    <script>
      const fileInput = document.getElementById("fileInput");
      const dropZone = document.getElementById("dropZone");
      const btnIndex = document.getElementById("btnIndex");
      const btnSend = document.getElementById("btnSend");
      const collapseSection = document.getElementById("collapseSection");
      const collapseHeader = document.getElementById("collapseHeader");
      const collapseBody = document.getElementById("collapseBody");
      const collapseArrow = document.getElementById("collapseArrow");
      const fileBadge = document.getElementById("fileBadge");
      const messages = document.getElementById("messages");
      const questionInput = document.getElementById("questionInput");

      // Elements cho phần Server Files
      const serverFilesHeader = document.getElementById("serverFilesHeader");
      const serverFilesBody = document.getElementById("serverFilesBody");
      const serverFilesArrow = document.getElementById("serverFilesArrow");

      let selectedFiles = [];
      let collapseOpen = false;
      let serverFilesOpen = false;

      // ── COLLAPSE TOGGLE UPLOADED FILES ──
      collapseHeader.addEventListener("click", () => {
        collapseOpen = !collapseOpen;
        collapseBody.classList.toggle("open", collapseOpen);
        collapseArrow.classList.toggle("open", collapseOpen);
      });

      // ── COLLAPSE TOGGLE SERVER FILES ──
      serverFilesHeader.addEventListener("click", async () => {
        serverFilesOpen = !serverFilesOpen;
        serverFilesBody.classList.toggle("open", serverFilesOpen);
        serverFilesArrow.classList.toggle("open", serverFilesOpen);

        if (serverFilesOpen) {
          serverFilesBody.innerHTML =
            '<div style="padding: 10px; font-size: 11px; color: var(--muted); text-align: center;">Đang tải...</div>';
          try {
            const res = await fetch("/list-files");
            const data = await res.json();

            serverFilesBody.innerHTML = "";
            if (data.files && data.files.length > 0) {
              data.files.forEach((file) => {
                const el = document.createElement("div");
                el.className = "file-item";
                el.innerHTML = `
                  <span class="fi-icon">📄</span>
                  <span class="fi-name" title="${file}">${file}</span>`;
                serverFilesBody.appendChild(el);
              });
            } else {
              serverFilesBody.innerHTML =
                '<div style="padding: 10px; font-size: 11px; color: var(--muted); text-align: center;">Không có file nào trong thư mục</div>';
            }
          } catch (e) {
            serverFilesBody.innerHTML =
              '<div style="padding: 10px; font-size: 11px; color: var(--danger); text-align: center;">Lỗi không thể tải danh sách</div>';
          }
        }
      });

      // ── FILE SELECT ──
      fileInput.addEventListener("change", () =>
        handleFiles([...fileInput.files]),
      );

      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("drag");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("drag"),
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("drag");
        handleFiles(
          [...e.dataTransfer.files].filter((f) => f.name.endsWith(".pdf")),
        );
      });

      function handleFiles(files) {
        const existing = new Set(selectedFiles.map((f) => f.name));
        files.forEach((f) => {
          if (!existing.has(f.name)) selectedFiles.push(f);
        });
        renderFileList();
        btnIndex.disabled = selectedFiles.length === 0;
        if (selectedFiles.length > 0) {
          collapseSection.style.display = "block";
          if (!collapseOpen) {
            collapseOpen = true;
            collapseBody.classList.add("open");
            collapseArrow.classList.add("open");
          }
        } else {
          collapseSection.style.display = "none";
        }
      }

      function renderFileList() {
        collapseBody.innerHTML = "";
        fileBadge.textContent = selectedFiles.length;
        selectedFiles.forEach((f, i) => {
          const el = document.createElement("div");
          el.className = "file-item";
          el.innerHTML = `
            <span class="fi-icon">📄</span>
            <span class="fi-name" title="${f.name}">${f.name}</span>
            <span class="fi-size">${(f.size / 1024).toFixed(0)}KB</span>
            <span class="fi-remove" data-idx="${i}" title="Xóa">✕</span>`;
          collapseBody.appendChild(el);
        });
        collapseBody.querySelectorAll(".fi-remove").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const idx = parseInt(e.target.dataset.idx);
            selectedFiles.splice(idx, 1);
            handleFiles([]);
          });
        });
      }

      // ── INDEX ──
      btnIndex.addEventListener("click", async () => {
        if (!selectedFiles.length) return;

        btnIndex.disabled = true;
        btnIndex.textContent = "⏳ Đang xử lý...";

        const form = new FormData();
        selectedFiles.forEach((f) => form.append("files", f));

        try {
          const res = await fetch("/upload", { method: "POST", body: form });
          const data = await res.json();

          if (res.ok) {
            appendBot(
              "Đã xong! Bạn có thể hỏi tôi về nội dung trong các tài liệu vừa upload. 📚",
            );
          } else {
            appendBot("❌ Lỗi: " + (data.error || "Không thể index"));
          }
        } catch {
          appendBot("❌ Lỗi: Không kết nối được server");
        }

        btnIndex.disabled = false;
        btnIndex.textContent = "⚡ Load File";
      });

      // ── CHAT ──
      btnSend.addEventListener("click", sendQuestion);
      questionInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendQuestion();
        }
      });
      questionInput.addEventListener("input", () => {
        questionInput.style.height = "auto";
        questionInput.style.height =
          Math.min(questionInput.scrollHeight, 120) + "px";
      });

      async function sendQuestion() {
        const q = questionInput.value.trim();
        if (!q) return;

        appendUser(q);
        questionInput.value = "";
        questionInput.style.height = "auto";
        btnSend.disabled = true;

        const typing = appendTyping();

        try {
          const res = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q }),
          });
          const data = await res.json();
          typing.remove();
          appendBot(
            res.ok ? data.answer : "⚠️ " + (data.error || "Lỗi không xác định"),
          );
        } catch {
          typing.remove();
          appendBot("⚠️ Không kết nối được server.");
        }
        btnSend.disabled = false;
      }

      function appendUser(text) {
        const div = document.createElement("div");
        div.className = "msg user";
        div.innerHTML = `<div class="msg-label">Bạn</div><div class="bubble">${esc(text)}</div>`;
        messages.appendChild(div);
        scrollBottom();
      }

      function appendBot(text) {
        const div = document.createElement("div");
        div.className = "msg bot";
        div.innerHTML = `<div class="msg-label">🤖 Bot</div><div class="bubble">${esc(text)}</div>`;
        messages.appendChild(div);
        scrollBottom();
      }

      function appendTyping() {
        const div = document.createElement("div");
        div.className = "msg bot";
        div.innerHTML = `<div class="msg-label">🤖 Bot</div>
      <div class="bubble bot typing-bubble"><span></span><span></span><span></span></div>`;
        messages.appendChild(div);
        scrollBottom();
        return div;
      }

      function scrollBottom() {
        messages.scrollTop = messages.scrollHeight;
      }

      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\n/g, "<br/>");
      }

      // ── MODEL SELECTOR ──
      let activeTab = "lmstudio";
      let modelBodyOpen = true;

      document
        .getElementById("modelSelectorHeader")
        .addEventListener("click", () => {
          modelBodyOpen = !modelBodyOpen;
          document.getElementById("modelSelectorBody").style.display =
            modelBodyOpen ? "" : "none";
          document
            .getElementById("modelArrow")
            .classList.toggle("open", modelBodyOpen);
        });

      function switchTab(tab) {
        activeTab = tab;
        document
          .getElementById("tabLMS")
          .classList.toggle("active", tab === "lmstudio");
        //        document
        //          .getElementById("tabGemini")
        //          .classList.toggle("active", tab === "gemini");
        document
          .getElementById("tabQwen")
          .classList.toggle("active", tab === "qwen");
        document.getElementById("panelLMS").style.display =
          tab === "lmstudio" ? "" : "none";
        //        document.getElementById("panelGemini").style.display =
        //          tab === "gemini" ? "" : "none";
        document.getElementById("panelQwen").style.display =
          tab === "qwen" ? "" : "none";
        document.getElementById("modelStatus").className = "model-status";
      }

      async function applyModel() {
        const btn = document.getElementById("btnApplyModel");
        const statusEl = document.getElementById("modelStatus");

        let model = "";
        if (activeTab === "lmstudio") {
          model = document.getElementById("lmsModelInput").value.trim();
        }
        //        else if (activeTab === "gemini") {
        //         model = document.getElementById("geminiModelSelect").value;
        //       }
        else if (activeTab === "qwen") {
          model = document.getElementById("qwenModelSelect").value;
        }

        if (!model) return;
        btn.disabled = true;
        btn.textContent = "⏳ Đang kết nối...";
        statusEl.className = "model-status";

        try {
          const res = await fetch("/set-model", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ type: activeTab, model }),
          });
          const data = await res.json();
          if (res.ok) {
            statusEl.className = "model-status ok";
            statusEl.textContent = "✅ Đã áp dụng!";
            updateModelHeader(activeTab, model);
            appendBot(
              `Đã chuyển sang model **${model}** (${activeTab}). Sẵn sàng trả lời! 🤖`,
            );
          } else {
            statusEl.className = "model-status err";
            statusEl.textContent = "❌ " + (data.error || "Lỗi không xác định");
          }
        } catch {
          statusEl.className = "model-status err";
          statusEl.textContent = "❌ Không kết nối được server";
        }
        btn.disabled = false;
        btn.textContent = "Áp dụng";
      }

      function updateModelHeader(type, model) {
        const short = model.length > 22 ? model.slice(0, 20) + "…" : model;
        let icon = "🖥";
        //       if (type === "gemini") icon = "✨";
        if (type === "qwen") icon = "🐉";
        document.getElementById("modelHeaderLabel").textContent =
          `${icon} ${short}`;
      }

      // Load current model on page load
      (async () => {
        try {
          const res = await fetch("/current-model");
          const data = await res.json();
          if (data.type) {
            activeTab = data.type;
            switchTab(data.type);
            updateModelHeader(data.type, data.model);

            if (data.type === "lmstudio") {
              document.getElementById("lmsModelInput").value = data.model;
            }
            // else if (data.type === "gemini") {
            //   document.getElementById("geminiModelSelect").value = data.model;
            // }
            else if (data.type === "qwen") {
              document.getElementById("qwenModelSelect").value = data.model;
            }
          }
        } catch {}
      })();
    </script>
  </body>
</html>
